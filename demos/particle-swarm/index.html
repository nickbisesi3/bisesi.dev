<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Swarm</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="loading">
    <!-- Webcam feed (mirrored for intuitive interaction) -->
    <video id="webcam" autoplay playsinline muted></video>

    <!-- Three.js particle canvas -->
    <div id="particle-canvas"></div>

    <!-- Status display -->
    <div id="status">
        <span id="fps">FPS: --</span>
        <span id="hand-status">Hand: Waiting...</span>
        <span id="gesture">Gesture: --</span>
    </div>

    <!-- Instructions -->
    <div id="instructions">
        <p>Closed fist = Collect particles</p>
        <p>Open hand = Repel particles</p>
    </div>

    <!-- Main Application -->
    <script type="module" src="main.js"></script>
</body>
</html>
