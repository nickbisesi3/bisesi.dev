<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bisesi Immersive Technologies</title>
  <meta name="description" content="Bisesi Immersive Technologies" />
  <meta property="og:title" content="Bisesi Immersive Technologies" />
  <meta property="og:description" content="Bisesi Immersive Technologies" />
  <meta name="theme-color" content="#060608" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      background: #060608;
      color: #f5f5f5;
      font-family: 'Saira', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      cursor: default;
      position: relative;
    }

    /* ── Atmospheric color orbs (give the glass something to refract) ── */
    .atmosphere {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .atmosphere .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(110px);
      will-change: transform;
    }
    .orb-1 {
      width: 70vw; height: 70vw;
      top: -22%; left: -18%;
      background: radial-gradient(circle, rgba(255, 94, 46, 0.42), transparent 70%);
      animation: drift1 32s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 65vw; height: 65vw;
      bottom: -22%; right: -18%;
      background: radial-gradient(circle, rgba(80, 130, 220, 0.34), transparent 70%);
      animation: drift2 40s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 50vw; height: 50vw;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(180, 90, 220, 0.18), transparent 70%);
      animation: drift3 44s ease-in-out infinite alternate;
    }
    @keyframes drift1 { to { transform: translate(8vw, 10vh) scale(1.1); } }
    @keyframes drift2 { to { transform: translate(-7vw, -6vh) scale(1.08); } }
    @keyframes drift3 { to { transform: translate(calc(-50% + 6vw), calc(-50% - 4vh)) scale(0.92); } }

    /* ── Subtle dot grain under the glass ── */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 24px 24px;
      mask-image: radial-gradient(ellipse 90% 65% at 50% 50%, black 30%, transparent 90%);
      -webkit-mask-image: radial-gradient(ellipse 90% 65% at 50% 50%, black 30%, transparent 90%);
    }

    /* ── Liquid glass shapes — float behind the wordmark ── */
    .glass-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .glass {
      position: absolute;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(34px) saturate(180%);
      -webkit-backdrop-filter: blur(34px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow:
        inset 0 1.5px 0 rgba(255, 255, 255, 0.28),
        inset 0 -1px 0 rgba(255, 255, 255, 0.04),
        0 30px 80px -20px rgba(0, 0, 0, 0.55);
      will-change: transform;
    }
    .glass-1 {
      width: clamp(300px, 36vw, 540px);
      height: clamp(300px, 36vw, 540px);
      top: 8%;
      left: -10%;
      border-radius: 50%;
      animation: float1 22s ease-in-out infinite alternate;
    }
    .glass-2 {
      width: clamp(240px, 30vw, 460px);
      height: clamp(120px, 14vw, 200px);
      bottom: 10%;
      right: -8%;
      border-radius: 9999px;
      animation: float2 26s ease-in-out infinite alternate;
    }
    .glass-3 {
      width: clamp(160px, 18vw, 280px);
      height: clamp(160px, 18vw, 280px);
      top: 68%;
      left: 60%;
      border-radius: 38% 42% 50% 46% / 50% 46% 42% 50%;
      animation: float3 30s ease-in-out infinite alternate;
    }
    @keyframes float1 { to { transform: translate(28px, -36px) rotate(7deg); } }
    @keyframes float2 { to { transform: translate(-32px, 22px) rotate(-5deg); } }
    @keyframes float3 { to { transform: translate(18px, -26px) rotate(6deg); } }

    /* ── Cursor spotlight ── */
    .spotlight {
      position: fixed;
      top: 0; left: 0;
      width: 540px; height: 540px;
      margin: -270px 0 0 -270px;
      pointer-events: none;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.06), transparent 62%);
      z-index: 1;
      opacity: 0;
      transition: transform 0.18s cubic-bezier(0.2, 0, 0, 1), opacity 0.4s ease;
      will-change: transform;
    }
    body.pointer-active .spotlight { opacity: 1; }

    /* ── Hero (wordmark) ── */
    .hero {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(1rem, 4vw, 3rem);
    }

    /* ── The wordmark — solid Saira caps, no glass on the text itself ── */
    h1 {
      margin: 0;
      text-align: center;
      user-select: none;
      font-family: 'Saira', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      line-height: 0.92;
      letter-spacing: 0.005em;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.05em;
      max-width: 100%;
      color: #fafafa;
      text-shadow:
        0 2px 8px rgba(0, 0, 0, 0.4),
        0 18px 50px rgba(0, 0, 0, 0.35);
    }

    .word { display: block; }
    /* Sized so all three words sit at roughly the same horizontal extent */
    .word.w1 { font-size: clamp(5rem,   24vw, 17rem); }
    .word.w2 { font-size: clamp(3rem,   15vw, 11rem); }
    .word.w3 { font-size: clamp(2.5rem, 12vw,  8.8rem); }

    .letter {
      display: inline-block;
      text-align: center;
      transition:
        color 0.25s ease,
        transform 0.32s cubic-bezier(0.2, 0, 0, 1),
        text-shadow 0.25s ease;
    }
    .letter:not(.space):hover {
      color: #ff5e2e;
      transform: translateY(-8px);
      cursor: pointer;
      text-shadow: 0 0 26px rgba(255, 94, 46, 0.6);
    }
    .letter.scrambling {
      color: #ff5e2e;
      text-shadow: 0 0 22px rgba(255, 94, 46, 0.55);
    }

    /* ── Scroll cue ── */
    .scroll-cue {
      position: absolute;
      bottom: clamp(1.25rem, 3vw, 2.5rem);
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Saira', sans-serif;
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(250, 250, 250, 0.45);
      text-decoration: none;
      padding: 0.6rem 1rem;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      transition: color 0.25s ease, transform 0.5s ease;
      animation: cue-bob 2.6s ease-in-out infinite;
      z-index: 3;
    }
    .scroll-cue:hover { color: rgba(250, 250, 250, 0.95); }
    .scroll-cue .arr {
      display: inline-block;
      width: 1px;
      height: 18px;
      background: currentColor;
      position: relative;
    }
    .scroll-cue .arr::after {
      content: '';
      position: absolute;
      left: -3px; bottom: 0;
      width: 7px; height: 7px;
      border-right: 1px solid currentColor;
      border-bottom: 1px solid currentColor;
      transform: rotate(45deg);
    }
    @keyframes cue-bob {
      0%, 100% { transform: translate(-50%, 0); }
      50%      { transform: translate(-50%, 4px); }
    }

    /* ── Work section ── */
    .work {
      position: relative;
      z-index: 2;
      max-width: 1100px;
      margin: 0 auto;
      padding: clamp(3rem, 8vw, 7rem) clamp(1rem, 4vw, 3rem) clamp(5rem, 10vw, 9rem);
    }
    .work-head {
      text-align: center;
      margin-bottom: clamp(2rem, 5vw, 3.5rem);
    }
    .work-title {
      margin: 0 0 0.6rem;
      font-family: 'Saira', sans-serif;
      font-weight: 700;
      font-size: clamp(2.5rem, 8vw, 5rem);
      letter-spacing: 0.005em;
      text-transform: uppercase;
      color: #fafafa;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    }
    .work-sub {
      margin: 0;
      font-family: 'Saira', sans-serif;
      font-weight: 500;
      font-size: clamp(0.9rem, 1.4vw, 1.05rem);
      color: rgba(250, 250, 250, 0.6);
      letter-spacing: 0.02em;
    }

    .tile-grid {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 340px), 1fr));
      gap: clamp(1rem, 2vw, 1.75rem);
    }

    /* ── Tile — uses the liquid-glass recipe verbatim ── */
    .tile {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 24px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(34px) saturate(180%);
      -webkit-backdrop-filter: blur(34px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow:
        inset 0 1.5px 0 rgba(255, 255, 255, 0.28),
        inset 0 -1px 0 rgba(255, 255, 255, 0.04),
        0 30px 80px -20px rgba(0, 0, 0, 0.55);
      transition:
        transform 0.45s cubic-bezier(0.2, 0, 0, 1),
        box-shadow 0.45s ease;
    }
    .tile:hover {
      transform: translateY(-3px);
      box-shadow:
        inset 0 1.5px 0 rgba(255, 255, 255, 0.34),
        inset 0 -1px 0 rgba(255, 255, 255, 0.05),
        0 36px 100px -25px rgba(0, 0, 0, 0.65),
        0 0 0 1px rgba(255, 94, 46, 0.25),
        0 0 60px -10px rgba(255, 94, 46, 0.4);
    }

    /* CSS-painted posters (no image assets needed for v1) */
    .tile-poster {
      position: absolute;
      inset: 0;
      transition: transform 0.6s cubic-bezier(0.2, 0, 0, 1), filter 0.3s ease;
      filter: saturate(0.9) brightness(0.9);
    }
    .tile:hover .tile-poster {
      transform: scale(1.04);
      filter: saturate(1.1) brightness(1.05);
    }

    /* Solar System poster — sun + planets + starfield on deep space */
    .tile[data-demo="solar-system"] .tile-poster {
      background:
        /* sun glow + core */
        radial-gradient(circle 90px at 52% 50%, rgba(255, 180,  70, 0.32), transparent 70%),
        radial-gradient(circle 14px at 52% 50%, rgba(255, 220, 120, 0.98), transparent 80%),
        /* planets */
        radial-gradient(circle 5px  at 24% 56%, rgba(190, 140, 100, 0.95), transparent 80%),
        radial-gradient(circle 7px  at 72% 38%, rgba( 80, 150, 210, 0.95), transparent 80%),
        radial-gradient(circle 9px  at 82% 66%, rgba(210, 110,  60, 0.95), transparent 80%),
        radial-gradient(circle 4px  at 33% 30%, rgba(150, 200, 220, 0.90), transparent 80%),
        radial-gradient(circle 6px  at 15% 72%, rgba(220, 200, 160, 0.90), transparent 80%),
        /* faint orbit hint */
        radial-gradient(ellipse 38% 14% at 52% 50%, transparent 48%, rgba(255,255,255,0.06) 50%, transparent 52%),
        radial-gradient(ellipse 24% 9%  at 52% 50%, transparent 48%, rgba(255,255,255,0.08) 50%, transparent 52%),
        /* starfield */
        radial-gradient(circle 1px   at  8% 18%, rgba(255,255,255,0.55), transparent),
        radial-gradient(circle 1px   at 18% 84%, rgba(255,255,255,0.45), transparent),
        radial-gradient(circle 1.5px at 88% 14%, rgba(255,255,255,0.65), transparent),
        radial-gradient(circle 1px   at 92% 82%, rgba(255,255,255,0.45), transparent),
        radial-gradient(circle 1px   at 45% 12%, rgba(255,255,255,0.40), transparent),
        radial-gradient(circle 1px   at 62% 90%, rgba(255,255,255,0.40), transparent),
        radial-gradient(circle 1.5px at 38% 78%, rgba(255,255,255,0.55), transparent),
        /* space gradient */
        radial-gradient(ellipse 80% 70% at 52% 50%, #0c0e18 0%, #04040a 100%);
    }

    .tile-tag {
      position: absolute;
      top: clamp(0.9rem, 2vw, 1.4rem);
      right: clamp(0.9rem, 2vw, 1.4rem);
      font-family: 'Saira', sans-serif;
      font-weight: 600;
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(250, 250, 250, 0.7);
      padding: 0.35rem 0.7rem;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
    }

    .tile-meta {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: clamp(1.25rem, 3vw, 2rem);
      background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.55) 60%, rgba(0,0,0,0.75) 100%);
    }
    .tile-name {
      margin: 0 0 0.4rem;
      font-family: 'Saira', sans-serif;
      font-weight: 700;
      font-size: clamp(1.1rem, 2.2vw, 1.6rem);
      letter-spacing: 0.005em;
      text-transform: uppercase;
      color: #fafafa;
    }
    .tile-name .tile-letter {
      display: inline-block;
      text-align: center;
      transition: color 0.25s ease;
    }
    .tile-name .tile-letter.scrambling { color: #ff5e2e; }
    .tile-desc {
      margin: 0;
      font-family: 'Saira', sans-serif;
      font-weight: 500;
      font-size: clamp(0.8rem, 1.2vw, 0.95rem);
      color: rgba(250, 250, 250, 0.7);
      max-width: 50ch;
    }

    /* ── Demo overlay ── */
    .demo-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      background: rgba(6, 6, 8, 0.92);
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .demo-overlay.open { opacity: 1; }
    .demo-overlay[hidden] { display: none; }

    .demo-close {
      position: absolute;
      top: clamp(1rem, 2.5vw, 1.75rem);
      right: clamp(1rem, 2.5vw, 1.75rem);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: rgba(250, 250, 250, 0.85);
      font-family: 'Saira', sans-serif;
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.55rem 1rem;
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease;
      z-index: 12;
    }
    .demo-close:hover {
      color: #fff;
      background: rgba(255, 94, 46, 0.18);
      border-color: rgba(255, 94, 46, 0.4);
    }

    .demo-titlebar {
      position: absolute;
      top: clamp(1rem, 2.5vw, 1.75rem);
      left: clamp(1rem, 2.5vw, 1.75rem);
      font-family: 'Saira', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(250, 250, 250, 0.8);
      z-index: 12;
      pointer-events: none;
    }

    .demo-gate {
      position: relative;
      z-index: 11;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 2rem;
      max-width: min(90vw, 480px);
      text-align: center;
    }
    .demo-gate[hidden] { display: none; }
    .gate-msg {
      margin: 0;
      font-family: 'Saira', sans-serif;
      font-weight: 500;
      font-size: clamp(1rem, 1.6vw, 1.2rem);
      color: rgba(250, 250, 250, 0.85);
      letter-spacing: 0.01em;
      line-height: 1.45;
    }
    .gate-msg .accent { color: #ff5e2e; }
    .gate-start {
      font-family: 'Saira', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #fafafa;
      background: rgba(255, 94, 46, 0.22);
      border: 1px solid rgba(255, 94, 46, 0.55);
      padding: 0.85rem 1.6rem;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }
    .gate-start:hover {
      background: rgba(255, 94, 46, 0.4);
      transform: translateY(-1px);
      box-shadow: 0 8px 30px -8px rgba(255, 94, 46, 0.5);
    }

    .demo-frame-host {
      position: absolute;
      inset: 0;
      z-index: 11;
    }
    .demo-frame-host[hidden] { display: none; }
    .demo-frame-host iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    body.demo-open { overflow: hidden; }

    /* ── Click ripple ── */
    .ripple {
      position: fixed;
      pointer-events: none;
      border: 1px solid rgba(255, 94, 46, 0.7);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: ripple-grow 0.85s cubic-bezier(0.2, 0, 0, 1) forwards;
      z-index: 5;
      width: 0; height: 0;
    }
    @keyframes ripple-grow {
      0%   { width: 0;     height: 0;     opacity: 0.9; }
      100% { width: 340px; height: 340px; opacity: 0;   }
    }

    @media (max-width: 540px) {
      h1 { gap: 0.03em; }
    }

    @media (prefers-reduced-motion: reduce) {
      .letter, .spotlight, .glass, .orb, .scroll-cue, .tile, .tile-poster, .demo-overlay {
        transition: none !important;
        animation: none !important;
      }
      .ripple { display: none; }
    }
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="atmosphere" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>
  <div class="glass-layer" aria-hidden="true">
    <div class="glass glass-1"></div>
    <div class="glass glass-2"></div>
    <div class="glass glass-3"></div>
  </div>
  <div class="spotlight" aria-hidden="true"></div>

  <section class="hero">
    <h1 aria-label="Bisesi Immersive Technologies">
      <span class="word w1" data-word="BISESI"></span>
      <span class="word w2" data-word="IMMERSIVE"></span>
      <span class="word w3" data-word="TECHNOLOGIES"></span>
    </h1>
    <a class="scroll-cue" href="#work" aria-label="Scroll to work">
      Work <span class="arr" aria-hidden="true"></span>
    </a>
  </section>

  <section class="work" id="work">
    <header class="work-head">
      <h2 class="work-title">Work</h2>
      <p class="work-sub">Browser-native experiments. Click to explore.</p>
    </header>
    <ul class="tile-grid">
      <li class="tile"
          data-demo="solar-system"
          data-title="Solar System"
          aria-label="Open Solar System demo">
        <div class="tile-poster" aria-hidden="true"></div>
        <span class="tile-tag">Webcam · Three.js</span>
        <div class="tile-meta">
          <h3 class="tile-name" data-name="Solar System"></h3>
          <p class="tile-desc">Point to aim, pinch to grab and move planets. Two-hand pinch to pan the system.</p>
        </div>
      </li>
    </ul>
  </section>

  <div class="demo-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="demo-titlebar">
    <button class="demo-close" type="button" aria-label="Close demo">× Close</button>
    <div class="demo-titlebar" id="demo-titlebar"></div>
    <div class="demo-gate">
      <p class="gate-msg">Particle Swarm uses your <span class="accent">webcam</span> for hand tracking.</p>
      <button class="gate-start" type="button">Start →</button>
    </div>
    <div class="demo-frame-host" hidden></div>
  </div>

  <script>
    const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#@%/<>';
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Wrap each character in its own span so we can target it
    document.querySelectorAll('.word').forEach(word => {
      const txt = word.dataset.word;
      word.innerHTML = txt.split('').map(ch => {
        if (ch === ' ') return '<span class="letter space">&nbsp;</span>';
        return `<span class="letter" data-char="${ch}">${ch}</span>`;
      }).join('');
    });

    const letters = Array.from(document.querySelectorAll('.letter:not(.space)'));

    // Lock each letter's box to its natural width so the scramble (which
    // swaps in random chars of different widths) can't change the word
    // width and push it to the next line. Stored in em so it scales with
    // the responsive font-size automatically.
    async function lockLetterWidths() {
      if (document.fonts && document.fonts.ready) {
        try { await document.fonts.ready; } catch (e) {}
      }
      letters.forEach(l => {
        const w = l.getBoundingClientRect().width;
        const parentFontSize = parseFloat(getComputedStyle(l.parentElement).fontSize);
        if (parentFontSize > 0 && w > 0) {
          l.style.width = (w / parentFontSize) + 'em';
        }
      });
    }
    lockLetterWidths();

    function scramble(el, duration = 380) {
      if (reduceMotion) return;
      const target = el.dataset.char;
      if (!target) return;
      if (el._timer) clearInterval(el._timer);
      el.classList.add('scrambling');
      const frames = Math.max(4, Math.floor(duration / 35));
      let f = 0;
      el._timer = setInterval(() => {
        if (f >= frames) {
          el.textContent = target;
          el.classList.remove('scrambling');
          clearInterval(el._timer);
          el._timer = null;
          return;
        }
        el.textContent = CHARS[Math.floor(Math.random() * CHARS.length)];
        f++;
      }, 35);
    }

    // Hover a letter → scramble that letter
    letters.forEach(l => {
      l.addEventListener('mouseenter', () => scramble(l, 350));
    });

    // ── Tile titles: wrap chars and reuse scramble on hover ─────────────
    const tileNames = document.querySelectorAll('.tile-name[data-name]');
    const tileLetters = [];
    tileNames.forEach(name => {
      const txt = name.dataset.name;
      name.innerHTML = txt.split('').map(ch => {
        if (ch === ' ') return '<span class="tile-letter space">&nbsp;</span>';
        return `<span class="tile-letter" data-char="${ch}">${ch}</span>`;
      }).join('');
      name.querySelectorAll('.tile-letter:not(.space)').forEach(l => tileLetters.push(l));
    });
    // Lock tile-letter widths once fonts load
    (async () => {
      if (document.fonts && document.fonts.ready) {
        try { await document.fonts.ready; } catch (e) {}
      }
      tileLetters.forEach(l => {
        const w = l.getBoundingClientRect().width;
        const parentFontSize = parseFloat(getComputedStyle(l.parentElement).fontSize);
        if (parentFontSize > 0 && w > 0) {
          l.style.width = (w / parentFontSize) + 'em';
        }
      });
    })();
    document.querySelectorAll('.tile').forEach(tile => {
      tile.addEventListener('mouseenter', () => {
        const letters = tile.querySelectorAll('.tile-letter:not(.space)');
        letters.forEach((l, i) => setTimeout(() => scramble(l, 380), i * 16));
      });
    });

    // ── Demo overlay flow ───────────────────────────────────────────────
    const overlay = document.querySelector('.demo-overlay');
    const overlayTitle = overlay.querySelector('.demo-titlebar');
    const gate = overlay.querySelector('.demo-gate');
    const gateStart = overlay.querySelector('.gate-start');
    const gateMsg = overlay.querySelector('.gate-msg');
    const frameHost = overlay.querySelector('.demo-frame-host');
    const closeBtn = overlay.querySelector('.demo-close');

    let currentDemo = null;

    function openDemo(demoSlug, title) {
      currentDemo = demoSlug;
      overlayTitle.textContent = title;
      gateMsg.innerHTML = `${title} uses your <span class="accent">webcam</span> for hand tracking.`;
      gate.hidden = false;
      frameHost.hidden = true;
      frameHost.innerHTML = '';
      overlay.hidden = false;
      document.body.classList.add('demo-open');
      // Next frame so the transition runs
      requestAnimationFrame(() => overlay.classList.add('open'));
    }

    function startDemo() {
      if (!currentDemo) return;
      const iframe = document.createElement('iframe');
      iframe.src = `/demos/${currentDemo}/`;
      iframe.setAttribute('allow', 'camera; microphone; fullscreen');
      // allow-same-origin is required for getUserMedia to work inside a sandboxed
      // iframe — without it the frame has an opaque origin and the browser
      // silently blocks the camera prompt even with allow="camera" set.
      iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');
      iframe.setAttribute('title', overlayTitle.textContent);
      frameHost.appendChild(iframe);
      gate.hidden = true;
      frameHost.hidden = false;
    }

    function closeDemo() {
      overlay.classList.remove('open');
      document.body.classList.remove('demo-open');
      // Wait for fade then strip iframe (kills WebGL + releases camera)
      setTimeout(() => {
        overlay.hidden = true;
        frameHost.innerHTML = '';
        gate.hidden = false;
        frameHost.hidden = true;
        currentDemo = null;
      }, 400);
    }

    document.querySelectorAll('.tile[data-demo]').forEach(tile => {
      tile.addEventListener('click', (e) => {
        e.stopPropagation();
        openDemo(tile.dataset.demo, tile.dataset.title);
      });
    });

    gateStart.addEventListener('click', (e) => {
      e.stopPropagation();
      startDemo();
    });

    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      closeDemo();
    });

    overlay.addEventListener('click', (e) => {
      // Only close when clicking the backdrop, not the iframe / gate / close
      if (e.target === overlay) closeDemo();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !overlay.hidden) closeDemo();
    });

    // ── Click anywhere → ripple + cascade scramble across the wordmark ──
    document.addEventListener('click', (e) => {
      // Skip when overlay is open (clicks belong to the demo, not the page)
      if (!overlay.hidden) return;
      // Don't trigger when clicking the tile, gate, scroll cue, or close
      if (e.target.closest('.tile, .demo-overlay, .scroll-cue')) return;

      const r = document.createElement('div');
      r.className = 'ripple';
      r.style.left = e.clientX + 'px';
      r.style.top = e.clientY + 'px';
      document.body.appendChild(r);
      setTimeout(() => r.remove(), 850);

      letters.forEach((l, i) => {
        setTimeout(() => scramble(l, 500 + Math.random() * 300), i * 14);
      });
    });

    // Cursor spotlight follows the pointer
    const spotlight = document.querySelector('.spotlight');
    document.addEventListener('pointermove', (e) => {
      document.body.classList.add('pointer-active');
      spotlight.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
    }, { passive: true });
  </script>
</body>
</html>
