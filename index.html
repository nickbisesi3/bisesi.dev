<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bisesi Educational Technologies</title>
  <meta name="description" content="Bisesi Educational Technologies" />
  <meta property="og:title" content="Bisesi Educational Technologies" />
  <meta property="og:description" content="Bisesi Educational Technologies" />
  <meta name="theme-color" content="#0a0a0a" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }

    body {
      background: #0a0a0a;
      color: #f5f5f5;
      font-family: 'Saira', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
      cursor: default;
      position: relative;
    }

    /* Cursor spotlight — soft orange glow following the pointer */
    .spotlight {
      position: fixed;
      top: 0; left: 0;
      width: 520px; height: 520px;
      margin: -260px 0 0 -260px;
      pointer-events: none;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 94, 46, 0.11), transparent 62%);
      z-index: 0;
      opacity: 0;
      transition: transform 0.18s cubic-bezier(0.2, 0, 0, 1), opacity 0.4s ease;
      will-change: transform;
    }
    body.pointer-active .spotlight { opacity: 1; }

    h1 {
      position: relative;
      z-index: 1;
      font-family: 'Saira', sans-serif;
      font-weight: 500;
      font-size: clamp(1.5rem, 4.5vw, 3.25rem);
      letter-spacing: 0.02em;
      line-height: 1.15;
      margin: 0;
      text-align: center;
      user-select: none;
    }

    .letter {
      display: inline-block;
      transition:
        color 0.25s ease,
        transform 0.25s cubic-bezier(0.2, 0, 0, 1),
        text-shadow 0.25s ease;
    }
    .letter:not(.space):hover {
      color: #ff5e2e;
      transform: translateY(-4px);
      text-shadow: 0 0 18px rgba(255, 94, 46, 0.55);
      cursor: pointer;
    }
    .letter.scrambling {
      color: #ff5e2e;
      text-shadow: 0 0 16px rgba(255, 94, 46, 0.55);
    }

    /* Click ripple */
    .ripple {
      position: fixed;
      pointer-events: none;
      border: 1px solid rgba(255, 94, 46, 0.65);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: ripple-grow 0.75s cubic-bezier(0.2, 0, 0, 1) forwards;
      z-index: 2;
      width: 0; height: 0;
    }
    @keyframes ripple-grow {
      0%   { width: 0; height: 0; opacity: 0.9; }
      100% { width: 260px; height: 260px; opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .letter, .spotlight { transition: none !important; }
      .ripple { display: none; }
    }
  </style>
</head>
<body>
  <div class="spotlight" aria-hidden="true"></div>
  <h1 id="brand">Bisesi Educational Technologies</h1>

  <script>
    const BRAND = 'Bisesi Educational Technologies';
    const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789#@%/<>';
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const brand = document.getElementById('brand');

    // Wrap each character in its own span so we can target it
    brand.innerHTML = BRAND.split('').map(ch => {
      if (ch === ' ') return '<span class="letter space">&nbsp;</span>';
      // Escape only what we render — these are all plain letters here, safe.
      return `<span class="letter" data-char="${ch}">${ch}</span>`;
    }).join('');

    const letters = Array.from(brand.querySelectorAll('.letter:not(.space)'));

    function scramble(el, duration = 380) {
      if (reduceMotion) return;
      const target = el.dataset.char;
      if (!target) return;
      if (el._timer) clearInterval(el._timer);
      el.classList.add('scrambling');
      const frames = Math.max(4, Math.floor(duration / 35));
      let f = 0;
      el._timer = setInterval(() => {
        if (f >= frames) {
          el.textContent = target;
          el.classList.remove('scrambling');
          clearInterval(el._timer);
          el._timer = null;
          return;
        }
        el.textContent = CHARS[Math.floor(Math.random() * CHARS.length)];
        f++;
      }, 35);
    }

    // Hover a letter → scramble that letter
    letters.forEach(l => {
      l.addEventListener('mouseenter', () => scramble(l, 350));
    });

    // Click anywhere → ripple + cascade scramble the whole word
    document.addEventListener('click', (e) => {
      const r = document.createElement('div');
      r.className = 'ripple';
      r.style.left = e.clientX + 'px';
      r.style.top = e.clientY + 'px';
      document.body.appendChild(r);
      setTimeout(() => r.remove(), 750);

      letters.forEach((l, i) => {
        setTimeout(() => scramble(l, 500 + Math.random() * 300), i * 18);
      });
    });

    // Cursor spotlight follows the pointer
    const spotlight = document.querySelector('.spotlight');
    document.addEventListener('pointermove', (e) => {
      document.body.classList.add('pointer-active');
      spotlight.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
    }, { passive: true });
  </script>
</body>
</html>
