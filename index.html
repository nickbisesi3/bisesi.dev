<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bisesi Educational Technologies</title>
  <meta name="description" content="Bisesi Educational Technologies" />
  <meta property="og:title" content="Bisesi Educational Technologies" />
  <meta property="og:description" content="Bisesi Educational Technologies" />
  <meta name="theme-color" content="#060608" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }

    body {
      background: #060608;
      color: #f5f5f5;
      font-family: 'Saira', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(1rem, 4vw, 3rem);
      overflow: hidden;
      cursor: default;
      position: relative;
    }

    /* ── Atmospheric color orbs (give the glass something to refract) ── */
    .atmosphere {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .atmosphere .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(110px);
      will-change: transform;
    }
    .orb-1 {
      width: 70vw; height: 70vw;
      top: -22%; left: -18%;
      background: radial-gradient(circle, rgba(255, 94, 46, 0.42), transparent 70%);
      animation: drift1 32s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 65vw; height: 65vw;
      bottom: -22%; right: -18%;
      background: radial-gradient(circle, rgba(80, 130, 220, 0.34), transparent 70%);
      animation: drift2 40s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 50vw; height: 50vw;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(180, 90, 220, 0.18), transparent 70%);
      animation: drift3 44s ease-in-out infinite alternate;
    }
    @keyframes drift1 { to { transform: translate(8vw, 10vh) scale(1.1); } }
    @keyframes drift2 { to { transform: translate(-7vw, -6vh) scale(1.08); } }
    @keyframes drift3 { to { transform: translate(calc(-50% + 6vw), calc(-50% - 4vh)) scale(0.92); } }

    /* ── Subtle dot grain under the glass ── */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 24px 24px;
      mask-image: radial-gradient(ellipse 90% 65% at 50% 50%, black 30%, transparent 90%);
      -webkit-mask-image: radial-gradient(ellipse 90% 65% at 50% 50%, black 30%, transparent 90%);
    }

    /* ── Liquid glass shapes — float behind the wordmark ── */
    .glass-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .glass {
      position: absolute;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(34px) saturate(180%);
      -webkit-backdrop-filter: blur(34px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow:
        inset 0 1.5px 0 rgba(255, 255, 255, 0.28),
        inset 0 -1px 0 rgba(255, 255, 255, 0.04),
        0 30px 80px -20px rgba(0, 0, 0, 0.55);
      will-change: transform;
    }
    .glass-1 {
      width: clamp(300px, 36vw, 540px);
      height: clamp(300px, 36vw, 540px);
      top: 8%;
      left: -10%;
      border-radius: 50%;
      animation: float1 22s ease-in-out infinite alternate;
    }
    .glass-2 {
      width: clamp(240px, 30vw, 460px);
      height: clamp(120px, 14vw, 200px);
      bottom: 10%;
      right: -8%;
      border-radius: 9999px;
      animation: float2 26s ease-in-out infinite alternate;
    }
    .glass-3 {
      width: clamp(160px, 18vw, 280px);
      height: clamp(160px, 18vw, 280px);
      top: 68%;
      left: 60%;
      border-radius: 38% 42% 50% 46% / 50% 46% 42% 50%;
      animation: float3 30s ease-in-out infinite alternate;
    }
    @keyframes float1 { to { transform: translate(28px, -36px) rotate(7deg); } }
    @keyframes float2 { to { transform: translate(-32px, 22px) rotate(-5deg); } }
    @keyframes float3 { to { transform: translate(18px, -26px) rotate(6deg); } }

    /* ── Cursor spotlight ── */
    .spotlight {
      position: fixed;
      top: 0; left: 0;
      width: 540px; height: 540px;
      margin: -270px 0 0 -270px;
      pointer-events: none;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.06), transparent 62%);
      z-index: 1;
      opacity: 0;
      transition: transform 0.18s cubic-bezier(0.2, 0, 0, 1), opacity 0.4s ease;
      will-change: transform;
    }
    body.pointer-active .spotlight { opacity: 1; }

    /* ── The wordmark — solid Saira caps, no glass on the text itself ── */
    h1 {
      position: relative;
      z-index: 2;
      margin: 0;
      text-align: center;
      user-select: none;
      font-family: 'Saira', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      line-height: 0.92;
      letter-spacing: 0.005em;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.05em;
      max-width: 100%;
      color: #fafafa;
      text-shadow:
        0 2px 8px rgba(0, 0, 0, 0.4),
        0 18px 50px rgba(0, 0, 0, 0.35);
    }

    .word { display: block; }
    /* Sized so all three words sit at roughly the same horizontal extent */
    .word.w1 { font-size: clamp(5rem,   24vw, 17rem); }
    .word.w2 { font-size: clamp(2.7rem, 13vw,  9.5rem); }
    .word.w3 { font-size: clamp(2.5rem, 12vw,  8.8rem); }

    .letter {
      display: inline-block;
      text-align: center;
      transition:
        color 0.25s ease,
        transform 0.32s cubic-bezier(0.2, 0, 0, 1),
        text-shadow 0.25s ease;
    }
    .letter:not(.space):hover {
      color: #ff5e2e;
      transform: translateY(-8px);
      cursor: pointer;
      text-shadow: 0 0 26px rgba(255, 94, 46, 0.6);
    }
    .letter.scrambling {
      color: #ff5e2e;
      text-shadow: 0 0 22px rgba(255, 94, 46, 0.55);
    }

    /* ── Click ripple ── */
    .ripple {
      position: fixed;
      pointer-events: none;
      border: 1px solid rgba(255, 94, 46, 0.7);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: ripple-grow 0.85s cubic-bezier(0.2, 0, 0, 1) forwards;
      z-index: 5;
      width: 0; height: 0;
    }
    @keyframes ripple-grow {
      0%   { width: 0;     height: 0;     opacity: 0.9; }
      100% { width: 340px; height: 340px; opacity: 0;   }
    }

    @media (max-width: 540px) {
      h1 { gap: 0.03em; }
    }

    @media (prefers-reduced-motion: reduce) {
      .letter, .spotlight, .glass, .orb { transition: none !important; animation: none !important; }
      .ripple { display: none; }
    }
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="atmosphere" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>
  <div class="glass-layer" aria-hidden="true">
    <div class="glass glass-1"></div>
    <div class="glass glass-2"></div>
    <div class="glass glass-3"></div>
  </div>
  <div class="spotlight" aria-hidden="true"></div>

  <h1 aria-label="Bisesi Educational Technologies">
    <span class="word w1" data-word="BISESI"></span>
    <span class="word w2" data-word="EDUCATIONAL"></span>
    <span class="word w3" data-word="TECHNOLOGIES"></span>
  </h1>

  <script>
    const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#@%/<>';
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Wrap each character in its own span so we can target it
    document.querySelectorAll('.word').forEach(word => {
      const txt = word.dataset.word;
      word.innerHTML = txt.split('').map(ch => {
        if (ch === ' ') return '<span class="letter space">&nbsp;</span>';
        return `<span class="letter" data-char="${ch}">${ch}</span>`;
      }).join('');
    });

    const letters = Array.from(document.querySelectorAll('.letter:not(.space)'));

    // Lock each letter's box to its natural width so the scramble (which
    // swaps in random chars of different widths) can't change the word
    // width and push it to the next line. Stored in em so it scales with
    // the responsive font-size automatically.
    async function lockLetterWidths() {
      if (document.fonts && document.fonts.ready) {
        try { await document.fonts.ready; } catch (e) {}
      }
      letters.forEach(l => {
        const w = l.getBoundingClientRect().width;
        const parentFontSize = parseFloat(getComputedStyle(l.parentElement).fontSize);
        if (parentFontSize > 0 && w > 0) {
          l.style.width = (w / parentFontSize) + 'em';
        }
      });
    }
    lockLetterWidths();

    function scramble(el, duration = 380) {
      if (reduceMotion) return;
      const target = el.dataset.char;
      if (!target) return;
      if (el._timer) clearInterval(el._timer);
      el.classList.add('scrambling');
      const frames = Math.max(4, Math.floor(duration / 35));
      let f = 0;
      el._timer = setInterval(() => {
        if (f >= frames) {
          el.textContent = target;
          el.classList.remove('scrambling');
          clearInterval(el._timer);
          el._timer = null;
          return;
        }
        el.textContent = CHARS[Math.floor(Math.random() * CHARS.length)];
        f++;
      }, 35);
    }

    // Hover a letter → scramble that letter
    letters.forEach(l => {
      l.addEventListener('mouseenter', () => scramble(l, 350));
    });

    // Click anywhere → ripple + cascade scramble across all words
    document.addEventListener('click', (e) => {
      const r = document.createElement('div');
      r.className = 'ripple';
      r.style.left = e.clientX + 'px';
      r.style.top = e.clientY + 'px';
      document.body.appendChild(r);
      setTimeout(() => r.remove(), 850);

      letters.forEach((l, i) => {
        setTimeout(() => scramble(l, 500 + Math.random() * 300), i * 14);
      });
    });

    // Cursor spotlight follows the pointer
    const spotlight = document.querySelector('.spotlight');
    document.addEventListener('pointermove', (e) => {
      document.body.classList.add('pointer-active');
      spotlight.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
    }, { passive: true });
  </script>
</body>
</html>
