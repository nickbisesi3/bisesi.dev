<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bisesi Educational Technologies</title>
  <meta name="description" content="Bisesi Educational Technologies" />
  <meta property="og:title" content="Bisesi Educational Technologies" />
  <meta property="og:description" content="Bisesi Educational Technologies" />
  <meta name="theme-color" content="#060608" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }

    body {
      background: #060608;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(1rem, 4vw, 3rem);
      overflow: hidden;
      cursor: default;
      position: relative;
    }

    /* ── Atmospheric color orbs (gives the glass something to refract) ── */
    .atmosphere {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .atmosphere .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(110px);
      will-change: transform;
    }
    .orb-1 {
      width: 70vw; height: 70vw;
      top: -22%; left: -18%;
      background: radial-gradient(circle, rgba(255, 94, 46, 0.42), transparent 70%);
      animation: drift1 32s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 65vw; height: 65vw;
      bottom: -22%; right: -18%;
      background: radial-gradient(circle, rgba(80, 130, 220, 0.34), transparent 70%);
      animation: drift2 40s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 50vw; height: 50vw;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(180, 90, 220, 0.18), transparent 70%);
      animation: drift3 44s ease-in-out infinite alternate;
    }
    @keyframes drift1 { to { transform: translate(8vw, 10vh) scale(1.1); } }
    @keyframes drift2 { to { transform: translate(-7vw, -6vh) scale(1.08); } }
    @keyframes drift3 { to { transform: translate(calc(-50% + 6vw), calc(-50% - 4vh)) scale(0.92); } }

    /* ── Subtle dot grain so the glass has texture under it ── */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      mask-image: radial-gradient(ellipse 90% 65% at 50% 50%, black 30%, transparent 90%);
      -webkit-mask-image: radial-gradient(ellipse 90% 65% at 50% 50%, black 30%, transparent 90%);
    }

    /* ── Cursor spotlight ── */
    .spotlight {
      position: fixed;
      top: 0; left: 0;
      width: 540px; height: 540px;
      margin: -270px 0 0 -270px;
      pointer-events: none;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.07), transparent 62%);
      z-index: 1;
      opacity: 0;
      transition: transform 0.18s cubic-bezier(0.2, 0, 0, 1), opacity 0.4s ease;
      will-change: transform;
    }
    body.pointer-active .spotlight { opacity: 1; }

    /* ── The wordmark ── */
    h1 {
      position: relative;
      z-index: 2;
      margin: 0;
      text-align: center;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif;
      font-weight: 800;
      line-height: 0.86;
      letter-spacing: -0.045em;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.04em;
      max-width: 100%;
    }

    .word {
      display: block;
      filter:
        drop-shadow(0 2px 1px rgba(255,255,255,0.10))
        drop-shadow(0 22px 60px rgba(0,0,0,0.55));
      transition: filter 0.5s ease;
    }
    /* Tuned so each word fills a similar horizontal width — poster-balanced */
    .word.w1 { font-size: clamp(4.5rem, 22vw, 16rem); }
    .word.w2 { font-size: clamp(2.3rem, 11.4vw, 8.8rem); }
    .word.w3 { font-size: clamp(2.2rem, 10.8vw, 8.4rem); }

    .letter {
      display: inline-block;
      /* Glassmorphic refraction: bright at top, fading down */
      background: linear-gradient(180deg,
        rgba(255,255,255,1.0)   0%,
        rgba(255,255,255,0.85) 45%,
        rgba(255,255,255,0.50) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      transition:
        transform 0.32s cubic-bezier(0.2, 0, 0, 1),
        filter 0.3s ease;
    }
    .letter:not(.space):hover {
      transform: translateY(-8px) scale(1.02);
      cursor: pointer;
      filter: drop-shadow(0 0 24px rgba(255, 94, 46, 0.55));
    }
    .letter.scrambling {
      background: linear-gradient(180deg,
        rgba(255,180,130,1) 0%,
        rgba(255,94,46,0.85) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 22px rgba(255, 94, 46, 0.55));
    }

    /* ── Click ripple ── */
    .ripple {
      position: fixed;
      pointer-events: none;
      border: 1px solid rgba(255, 94, 46, 0.7);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: ripple-grow 0.85s cubic-bezier(0.2, 0, 0, 1) forwards;
      z-index: 5;
      width: 0; height: 0;
    }
    @keyframes ripple-grow {
      0%   { width: 0;     height: 0;     opacity: 0.9; }
      100% { width: 340px; height: 340px; opacity: 0;   }
    }

    @media (max-width: 540px) {
      h1 { letter-spacing: -0.035em; gap: 0.02em; }
    }

    @media (prefers-reduced-motion: reduce) {
      .letter, .spotlight, .word, .orb { transition: none !important; animation: none !important; }
      .ripple { display: none; }
    }
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="atmosphere" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>
  <div class="spotlight" aria-hidden="true"></div>

  <h1 aria-label="Bisesi Educational Technologies">
    <span class="word w1" data-word="Bisesi"></span>
    <span class="word w2" data-word="Educational"></span>
    <span class="word w3" data-word="Technologies"></span>
  </h1>

  <script>
    const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789#@%/<>';
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Wrap each character in its own span so we can target it
    document.querySelectorAll('.word').forEach(word => {
      const txt = word.dataset.word;
      word.innerHTML = txt.split('').map(ch => {
        if (ch === ' ') return '<span class="letter space">&nbsp;</span>';
        return `<span class="letter" data-char="${ch}">${ch}</span>`;
      }).join('');
    });

    const letters = Array.from(document.querySelectorAll('.letter:not(.space)'));

    function scramble(el, duration = 380) {
      if (reduceMotion) return;
      const target = el.dataset.char;
      if (!target) return;
      if (el._timer) clearInterval(el._timer);
      el.classList.add('scrambling');
      const frames = Math.max(4, Math.floor(duration / 35));
      let f = 0;
      el._timer = setInterval(() => {
        if (f >= frames) {
          el.textContent = target;
          el.classList.remove('scrambling');
          clearInterval(el._timer);
          el._timer = null;
          return;
        }
        el.textContent = CHARS[Math.floor(Math.random() * CHARS.length)];
        f++;
      }, 35);
    }

    // Hover a letter → scramble that letter
    letters.forEach(l => {
      l.addEventListener('mouseenter', () => scramble(l, 350));
    });

    // Click anywhere → ripple + cascade scramble across all words
    document.addEventListener('click', (e) => {
      const r = document.createElement('div');
      r.className = 'ripple';
      r.style.left = e.clientX + 'px';
      r.style.top = e.clientY + 'px';
      document.body.appendChild(r);
      setTimeout(() => r.remove(), 850);

      letters.forEach((l, i) => {
        setTimeout(() => scramble(l, 500 + Math.random() * 300), i * 14);
      });
    });

    // Cursor spotlight follows the pointer
    const spotlight = document.querySelector('.spotlight');
    document.addEventListener('pointermove', (e) => {
      document.body.classList.add('pointer-active');
      spotlight.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
    }, { passive: true });
  </script>
</body>
</html>
